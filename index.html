<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Product Card — Neon Edition</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap");

        /* ── Reset ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Space Grotesk", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #080b17;
            overflow: hidden;
            perspective: 1200px;
            position: relative;
        }

        /* ── Animated gradient background ── */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 25%, rgba(122, 92, 255, 0.25) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 75%, rgba(0, 229, 200, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 100%, rgba(255, 107, 203, 0.10) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
            animation: ambientPulse 10s ease-in-out infinite alternate;
        }

        @keyframes ambientPulse {
            0% {
                opacity: 0.7;
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1.06);
            }
        }

        /* ── Floating particles ── */
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            animation: floatParticle linear infinite;
            box-shadow: 0 0 8px rgba(122, 92, 255, 0.15);
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0.3);
                opacity: 0;
            }
            12% {
                opacity: 1;
            }
            88% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        /* ── Watermark ── */
        .watermark {
            position: fixed;
            bottom: 28px;
            right: 34px;
            z-index: 999;
            font-size: clamp(0.5rem, 0.8vw, 0.7rem);
            font-family: "Space Grotesk", sans-serif;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.10);
            letter-spacing: 1.8px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.30);
            padding: 8px 20px;
            border-radius: 40px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: opacity 0.5s ease;
        }

        .watermark span {
            background: linear-gradient(135deg, rgba(122, 92, 255, 0.6), rgba(0, 229, 200, 0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .watermark .heart {
            display: inline-block;
            animation: heartBeat 2.4s ease-in-out infinite;
            -webkit-text-fill-color: rgba(255, 107, 203, 0.4);
            font-size: 0.75em;
        }

        @keyframes heartBeat {
            0%,
            100% {
                transform: scale(1);
            }
            14% {
                transform: scale(1.35);
            }
            28% {
                transform: scale(1);
            }
            42% {
                transform: scale(1.2);
            }
            56% {
                transform: scale(1);
            }
        }

        /* ── Container ── */
        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 520px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ── Card ── */
        .card {
            width: 100%;
            min-height: 72vh;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 40px;
            padding: 2.2rem 2rem 2.8rem;
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                0 0 60px rgba(122, 92, 255, 0.06);
            transform-style: preserve-3d;
            transition: box-shadow 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(122, 92, 255, 0.25), rgba(0, 229, 200, 0.15), rgba(255, 107, 203, 0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 10;
        }

        /* ── Glow orb behind card ── */
        .card::after {
            content: "";
            position: absolute;
            top: -30%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(122, 92, 255, 0.08), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Sneaker section ── */
        .sneaker {
            min-height: 32vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .sneaker img {
            width: 55%;
            max-width: 200px;
            z-index: 2;
            transition: all 0.75s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 20px 40px rgba(122, 92, 255, 0.15));
            will-change: transform;
            user-select: none;
            -webkit-user-drag: none;
        }

        .circle {
            width: 55%;
            max-width: 200px;
            aspect-ratio: 1/1;
            background: radial-gradient(circle at 30% 30%, rgba(122, 92, 255, 0.35), rgba(0, 229, 200, 0.15));
            position: absolute;
            z-index: 1;
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(122, 92, 255, 0.08), inset 0 0 60px rgba(122, 92, 255, 0.04);
            transition: all 0.6s ease;
            animation: circlePulse 6s ease-in-out infinite alternate;
        }

        @keyframes circlePulse {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.08) rotate(8deg);
                opacity: 1;
            }
        }

        /* ── Info ── */
        .info {
            position: relative;
            z-index: 1;
        }

        .info .title {
            font-size: clamp(1.6rem, 4.5vw, 2.6rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f0f4ff, #c8d0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.75s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
        }

        .info .subtitle {
            font-size: clamp(0.65rem, 1.2vw, 0.85rem);
            padding: 1.2rem 0 1.6rem;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 400;
            line-height: 1.7;
            letter-spacing: 0.3px;
            transition: all 0.75s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
            max-width: 90%;
        }

        .info .subtitle span {
            background: linear-gradient(135deg, #7ae0ff, #7a5cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 500;
        }

        /* ── Sizes ── */
        .sizes {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            transition: all 0.75s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
        }

        .sizes button {
            padding: 0.6rem 1.6rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            letter-spacing: 0.5px;
            min-width: 52px;
            text-align: center;
        }

        .sizes button:hover {
            background: rgba(122, 92, 255, 0.10);
            border-color: rgba(122, 92, 255, 0.20);
            color: #fff;
            transform: translateY(-2px);
        }

        .sizes button.active {
            background: linear-gradient(135deg, rgba(122, 92, 255, 0.25), rgba(0, 229, 200, 0.12));
            border-color: rgba(122, 92, 255, 0.30);
            color: #fff;
            box-shadow: 0 4px 24px rgba(122, 92, 255, 0.12), inset 0 0 20px rgba(122, 92, 255, 0.04);
        }

        /* ── Purchase ── */
        .purchase {
            margin-top: 2.2rem;
            transition: all 0.75s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
        }

        .purchase button {
            width: 100%;
            padding: 1rem 0;
            background: linear-gradient(135deg, #7a5cff, #6a4ce0);
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 60px;
            font-weight: 700;
            font-family: inherit;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 32px rgba(122, 92, 255, 0.20);
            position: relative;
            overflow: hidden;
        }

        .purchase button::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 60px;
            background: linear-gradient(135deg, #00e5c8, #7a5cff);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 0;
        }

        .purchase button span {
            position: relative;
            z-index: 1;
        }

        .purchase button:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 48px rgba(122, 92, 255, 0.30);
        }

        .purchase button:hover::before {
            opacity: 1;
        }

        .purchase button:active {
            transform: scale(0.96);
        }

        /* ── Responsive ── */
        @media (min-width: 700px) {
            .container {
                max-width: 620px;
            }
            .card {
                padding: 3rem 3.5rem 3.2rem;
                min-height: 68vh;
            }
            .sneaker img {
                max-width: 260px;
            }
            .circle {
                max-width: 260px;
            }
            .info .subtitle {
                font-size: 0.9rem;
                padding: 1.4rem 0 1.8rem;
            }
            .sizes button {
                padding: 0.7rem 2rem;
                font-size: 0.9rem;
                min-width: 60px;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.6rem 1.4rem 2rem;
                min-height: 60vh;
                border-radius: 28px;
            }
            .sneaker {
                min-height: 26vh;
            }
            .sneaker img {
                width: 50%;
                max-width: 140px;
            }
            .circle {
                width: 50%;
                max-width: 140px;
            }
            .sizes {
                gap: 8px;
            }
            .sizes button {
                padding: 0.5rem 1.2rem;
                font-size: 0.7rem;
                min-width: 44px;
            }
            .purchase {
                margin-top: 1.6rem;
            }
            .purchase button {
                padding: 0.8rem 0;
                font-size: 0.85rem;
            }
            .info .subtitle {
                padding: 0.8rem 0 1.2rem;
                font-size: 0.6rem;
                max-width: 100%;
            }
            .watermark {
                bottom: 16px;
                right: 16px;
                padding: 5px 12px;
                font-size: 0.4rem;
                letter-spacing: 1.2px;
            }
        }

        @media (max-width: 380px) {
            .card {
                padding: 1.2rem 1rem 1.6rem;
                border-radius: 24px;
            }
            .sneaker img {
                max-width: 110px;
            }
            .circle {
                max-width: 110px;
            }
            .sizes button {
                padding: 0.4rem 0.9rem;
                font-size: 0.6rem;
                min-width: 38px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── Particles ─── -->
    <div id="particles"></div>

    <!-- ─── Watermark ─── -->
    <div class="watermark">
        <span class="heart">✦</span>
        <span>made by Sarthak Deokar</span>
        <span class="heart">✦</span>
    </div>

    <!-- ─── Card ─── -->
    <div class="container" id="container">
        <div class="card" id="card">

            <div class="sneaker">
                <div class="circle" id="circle"></div>
                <img
                src="img/adidas.png"
                alt="adidas Ultraboost"
                id="sneakerImg"
                />
            </div>

            <div class="info">
                <h1 class="title" id="title">Ultraboost 5</h1>
                <h3 class="subtitle" id="description">
                    <span>✦</span> Future-ready trainers with wrapped BOOST
                    for exceptional comfort. <span>✦</span>
                </h3>

                <div class="sizes" id="sizes">
                    <button>39</button>
                    <button>40</button>
                    <button class="active">42</button>
                    <button>44</button>
                    <button>46</button>
                </div>

                <div class="purchase" id="purchase">
                    <button><span>Add to Cart</span></button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ─── DOM refs ───
        const card = document.getElementById("card");
        const container = document.getElementById("container");

        const title = document.getElementById("title");
        const sneakerImg = document.getElementById("sneakerImg");
        const purchase = document.getElementById("purchase");
        const description = document.getElementById("description");
        const sizes = document.getElementById("sizes");
        const circle = document.getElementById("circle");

        // ─── Size button logic ───
        document.querySelectorAll(".sizes button").forEach((btn) => {
            btn.addEventListener("click", function() {
                document.querySelectorAll(".sizes button").forEach((b) => b.classList.remove("active"));
                this.classList.add("active");
            });
        });

        // ─── 3D Tilt ───
        let isHovering = false;
        let resetTimeout = null;

        container.addEventListener("mousemove", (e) => {
            if (!isHovering) return;

            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            const rotateX = ((y - centerY) / centerY) * -12;
            const rotateY = ((x - centerX) / centerX) * 12;

            card.style.transform =
                `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // ─── Animate In ───
        container.addEventListener("mouseenter", () => {
            isHovering = true;
            if (resetTimeout) {
                clearTimeout(resetTimeout);
                resetTimeout = null;
            }

            card.style.transition = "none";

            // Popout with depth
            title.style.transform = "translateZ(140px) scale(1.02)";
            sneakerImg.style.transform = "translateZ(220px) rotateZ(-8deg) scale(1.06)";
            description.style.transform = "translateZ(120px)";
            sizes.style.transform = "translateZ(100px)";
            purchase.style.transform = "translateZ(80px)";
            circle.style.transform = "scale(1.15)";
            card.style.boxShadow =
                "0 40px 100px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06) inset, 0 0 80px rgba(122,92,255,0.08)";
        });

        // ─── Animate Out ───
        container.addEventListener("mouseleave", () => {
            isHovering = false;

            card.style.transition = "all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)";
            card.style.transform = "rotateX(0deg) rotateY(0deg)";
            card.style.boxShadow =
                "0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset, 0 0 60px rgba(122,92,255,0.06)";

            // Popback
            title.style.transform = "translateZ(0) scale(1)";
            sneakerImg.style.transform = "translateZ(0) rotateZ(0deg) scale(1)";
            description.style.transform = "translateZ(0)";
            sizes.style.transform = "translateZ(0)";
            purchase.style.transform = "translateZ(0)";
            circle.style.transform = "scale(1)";

            resetTimeout = setTimeout(() => {
                card.style.transition = "all 0.5s ease";
            }, 100);
        });

        // ─── Touch support ───
        let touchStartX = 0;
        let touchStartY = 0;

        container.addEventListener("touchstart", (e) => {
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            isHovering = true;

            card.style.transition = "none";
            title.style.transform = "translateZ(80px) scale(1.02)";
            sneakerImg.style.transform = "translateZ(120px) rotateZ(-6deg) scale(1.04)";
            description.style.transform = "translateZ(70px)";
            sizes.style.transform = "translateZ(60px)";
            purchase.style.transform = "translateZ(50px)";
            circle.style.transform = "scale(1.1)";
        }, { passive: true });

        container.addEventListener("touchmove", (e) => {
            if (!isHovering) return;
            const touch = e.touches[0];
            const dx = (touch.clientX - touchStartX) / window.innerWidth * 30;
            const dy = (touch.clientY - touchStartY) / window.innerHeight * -20;
            card.style.transform = `rotateX(${dy}deg) rotateY(${dx}deg)`;
        }, { passive: true });

        container.addEventListener("touchend", () => {
            isHovering = false;
            card.style.transition = "all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)";
            card.style.transform = "rotateX(0deg) rotateY(0deg)";

            title.style.transform = "translateZ(0) scale(1)";
            sneakerImg.style.transform = "translateZ(0) rotateZ(0deg) scale(1)";
            description.style.transform = "translateZ(0)";
            sizes.style.transform = "translateZ(0)";
            purchase.style.transform = "translateZ(0)";
            circle.style.transform = "scale(1)";
        }, { passive: true });

        // ─── Particles ───
        (function createParticles() {
            const container = document.getElementById("particles");
            const count = 50;
            for (let i = 0; i < count; i++) {
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random() * 100 + "%";
                const size = 1.5 + Math.random() * 3.5;
                p.style.width = size + "px";
                p.style.height = size + "px";
                p.style.animationDuration = (12 + Math.random() * 30) + "s";
                p.style.animationDelay = (Math.random() * 28) + "s";
                p.style.opacity = 0.15 + Math.random() * 0.4;
                container.appendChild(p);
            }
        })();

        // ─── Console ───
        console.log("✦ 3D Product Card — Neon Edition ✦");
        console.log("made by Sarthak Deokar");
    </script>
</body>
</html>
